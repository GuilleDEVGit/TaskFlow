spring.application.name=taskflow
#Mysql conexion
spring.datasource.url=jdbc:mysql://localhost:3307/taskflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=taskflow_user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate usa EXACTAMENTE los nombres que pongo en las anotaciones
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
app.cors.allowed-origins=http://localhost:4200