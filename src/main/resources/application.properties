spring.application.name=taskflow
#Mysql conexion
#Base de datos en local
#spring.datasource.url=jdbc:mysql://localhost/taskflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=admin
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.flyway.enabled=false

#Security
jwt.secret=${JWT_SECRET}

# Hibernate usa EXACTAMENTE los nombres que pongo en las anotaciones
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
app.cors.allowed-origins=http://localhost:4200
server.forward-headers-strategy=native
server.use-forward-headers=true